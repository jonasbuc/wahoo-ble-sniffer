[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "wahoo-ble-sniffer"
version = "0.1.0"
description = "Wahoo BLE -> WebSocket bridge and Unity integration tools"
readme = "UnityIntegration/README.md"
license = { text = "MIT" }
authors = [ { name = "jonasbuc" } ]
requires-python = ">=3.11"

# Runtime dependencies
dependencies = [
  "bleak>=0.21.0",
  "websockets>=12.0"
]

[project.optional-dependencies]
dev = [
  "pytest>=7.0",
  "pytest-asyncio>=0.21.0",
  "flake8>=6.0",
  "mypy>=1.9.0",
]

[tool.setuptools.packages.find]
where = ["UnityIntegration"]
