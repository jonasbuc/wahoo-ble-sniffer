name: Python CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install package (editable) + dev deps
      run: |
        python -m pip install --upgrade pip
        pip install -e '.[dev]'

    - name: Lint (flake8)
      run: |
        flake8 . --max-line-length=120

    - name: Type check (mypy)
      run: |
        # Ensure mypy is installed (some runners may not expose the mypy script)
        python -m pip install --upgrade pip
        python -m pip install mypy
        # Limit type checking to the UnityIntegration package to avoid checking
        # untyped top-level scripts (like wahoo_ble_logger.py) that are not
        # currently fully annotated. We still use --ignore-missing-imports
        # to tolerate optional C-extension or platform-specific modules.
        python -m mypy UnityIntegration --ignore-missing-imports

    - name: Run tests with coverage
      run: |
        coverage run -m pytest
        coverage xml -i
