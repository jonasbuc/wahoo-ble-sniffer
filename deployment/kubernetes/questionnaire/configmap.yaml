---
apiVersion: v1
kind: ConfigMap
metadata:
  name: questionnaire-config
  namespace: carvr-local
  labels:
    app.kubernetes.io/name: questionnaire
    app.kubernetes.io/instance: carvr
    app.kubernetes.io/component: questionnaire
    app.kubernetes.io/part-of: carvr
data:
  QS_HOST: "0.0.0.0"
  QS_PORT: "8090"
  QS_DATA_DIR: "/data/questionnaire"
  QS_DB_PATH: "/data/questionnaire/questionnaire.db"
  LA_PARTICIPANTS_DIR: "/data/participants"
  QS_LOG_LEVEL: "INFO"
  # Internal K8s service name — not a browser-facing URL.
  QS_ANALYTICS_API_URL: "http://analytics-api:8080"
