---
# Kustomize entrypoint — applies all resources in the correct order.
# Usage:
#   kubectl kustomize deployment/kubernetes/ | kubectl apply -f -
# or:
#   kubectl apply -k deployment/kubernetes/
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: carvr-local

resources:
  # Namespace first
  - namespace.yaml

  # Shared storage
  - shared/participants-pvc.yaml

  # Analytics API
  - analytics-api/configmap.yaml
  - analytics-api/pvc.yaml
  - analytics-api/deployment.yaml
  - analytics-api/service.yaml

  # Questionnaire
  - questionnaire/configmap.yaml
  - questionnaire/pvc.yaml
  - questionnaire/deployment.yaml
  - questionnaire/service.yaml

  # Dashboard
  - dashboard/configmap.yaml
  - dashboard/pvc.yaml
  - dashboard/deployment.yaml
  - dashboard/service.yaml

  # Bridge is intentionally NOT included here.
  # The bridge communicates with physical Bluetooth hardware (Wahoo TICKR) and
  # must run as a local process on the host machine where Unity is running.
  # Running it in a pod would isolate it from host Bluetooth and from Unity's
  # network interface.  Use starters/START_BRIDGE.command (macOS) or
  # starters/START_BRIDGE.bat (Windows) to run the bridge locally.
  # Bridge manifests are kept in bridge/ for reference only.
