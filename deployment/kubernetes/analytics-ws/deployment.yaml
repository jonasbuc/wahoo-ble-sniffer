---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-ws
  namespace: carvr-local
  labels:
    app.kubernetes.io/name: analytics-ws
    app.kubernetes.io/instance: carvr
    app.kubernetes.io/component: ws-dashboard
    app.kubernetes.io/part-of: carvr
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: analytics-ws
      app.kubernetes.io/instance: carvr
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: analytics-ws
        app.kubernetes.io/instance: carvr
        app.kubernetes.io/component: ws-dashboard
        app.kubernetes.io/part-of: carvr
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: analytics-ws
          image: carvr/analytics-ws:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: ws-dashboard
              containerPort: 8768
              protocol: TCP
          envFrom:
            - configMapRef:
                name: analytics-ws-config
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          startupProbe:
            httpGet:
              path: /healthz
              port: ws-dashboard
            failureThreshold: 12
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: ws-dashboard
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: ws-dashboard
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          volumeMounts:
            - name: analytics-data
              mountPath: /data
              readOnly: true
      volumes:
        - name: analytics-data
          persistentVolumeClaim:
            claimName: analytics-api-data-pvc
