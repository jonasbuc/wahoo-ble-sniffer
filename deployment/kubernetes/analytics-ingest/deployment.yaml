---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-ingest
  namespace: carvr-local
  labels:
    app.kubernetes.io/name: analytics-ingest
    app.kubernetes.io/instance: carvr
    app.kubernetes.io/component: ingest
    app.kubernetes.io/part-of: carvr
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: analytics-ingest
      app.kubernetes.io/instance: carvr
  strategy:
    # Only one ingest writer at a time — Recreate avoids split-brain on SQLite
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: analytics-ingest
        app.kubernetes.io/instance: carvr
        app.kubernetes.io/component: ingest
        app.kubernetes.io/part-of: carvr
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: analytics-ingest
          image: carvr/analytics-ingest:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: ws-ingest
              containerPort: 8766
              protocol: TCP
            - name: healthz
              containerPort: 8767
              protocol: TCP
          envFrom:
            - configMapRef:
                name: analytics-ingest-config
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          startupProbe:
            httpGet:
              path: /healthz
              port: healthz
            failureThreshold: 12
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: healthz
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: healthz
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          volumeMounts:
            - name: analytics-data
              mountPath: /data
      volumes:
        - name: analytics-data
          persistentVolumeClaim:
            claimName: analytics-api-data-pvc
