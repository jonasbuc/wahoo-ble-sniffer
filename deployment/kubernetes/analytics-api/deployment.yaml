---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-api
  namespace: carvr-local
  labels:
    app.kubernetes.io/name: analytics-api
    app.kubernetes.io/instance: carvr
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: carvr
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: analytics-api
      app.kubernetes.io/instance: carvr
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: analytics-api
        app.kubernetes.io/instance: carvr
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: carvr
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: analytics-api
          image: carvr/analytics-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: ws-ingest
              containerPort: 8766
              protocol: TCP
          envFrom:
            - configMapRef:
                name: analytics-api-config
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            failureThreshold: 12
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          volumeMounts:
            - name: analytics-data
              mountPath: /data
              # /data/participants is provided by the shared PVC sub-path
            - name: participants
              mountPath: /data/participants
      volumes:
        - name: analytics-data
          persistentVolumeClaim:
            claimName: analytics-api-data-pvc
        - name: participants
          persistentVolumeClaim:
            claimName: carvr-participants-pvc
