# ── values.yaml – CarVR Helm chart defaults ──────────────────────────────────
# All settings can be overridden per-environment via values-minikube.yaml
# or values-kind.yaml, or with --set on the command line.

# ── Global ────────────────────────────────────────────────────────────────────
global:
  namespace: carvr-local
  imageRegistry: ""   # prefix for all images, e.g. "registry.example.com/"
  imagePullPolicy: IfNotPresent
  # Shared participants directory mounted by analytics-api AND questionnaire.
  participantsPvcSize: 1Gi
  storageClass: ""    # "" = use cluster default (standard on minikube/kind)

# ── Analytics API ─────────────────────────────────────────────────────────────
analyticsApi:
  enabled: true
  image:
    repository: carvr/analytics-api
    tag: latest
  replicaCount: 1

  service:
    type: ClusterIP
    httpPort: 8080
    wsIngestPort: 8766

  env:
    LA_HTTP_HOST: "0.0.0.0"
    LA_HTTP_PORT: "8080"
    LA_WS_INGEST_HOST: "0.0.0.0"
    LA_WS_INGEST_PORT: "8766"
    LA_DATA_DIR: "/data"
    LA_DB_PATH: "/data/analytics.db"
    LA_SESSIONS_DIR: "/data/sessions"
    LA_PARTICIPANTS_DIR: "/data/participants"
    LA_PULSE_LOG_DIR: "/data/pulse"
    LA_LOG_LEVEL: "INFO"

  persistence:
    enabled: true
    size: 5Gi
    mountPath: /data

  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]

  startupProbe:
    httpGet:
      path: /healthz
      port: 8080
    failureThreshold: 12
    periodSeconds: 5

  readinessProbe:
    httpGet:
      path: /healthz
      port: 8080
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 3

  livenessProbe:
    httpGet:
      path: /healthz
      port: 8080
    initialDelaySeconds: 15
    periodSeconds: 20
    failureThreshold: 3

# ── Questionnaire ─────────────────────────────────────────────────────────────
questionnaire:
  enabled: true
  image:
    repository: carvr/questionnaire
    tag: latest
  replicaCount: 1

  service:
    type: ClusterIP
    port: 8090

  env:
    QS_HOST: "0.0.0.0"
    QS_PORT: "8090"
    QS_DATA_DIR: "/data/questionnaire"
    QS_DB_PATH: "/data/questionnaire/questionnaire.db"
    LA_PARTICIPANTS_DIR: "/data/participants"
    QS_LOG_LEVEL: "INFO"
    # Internal K8s DNS name — not browser-facing.
    QS_ANALYTICS_API_URL: "http://analytics-api:8080"

  persistence:
    enabled: true
    size: 1Gi
    mountPath: /data/questionnaire

  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "300m"
      memory: "256Mi"

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]

  startupProbe:
    httpGet:
      path: /api/healthz
      port: 8090
    failureThreshold: 12
    periodSeconds: 5

  readinessProbe:
    httpGet:
      path: /api/healthz
      port: 8090
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 3

  livenessProbe:
    httpGet:
      path: /api/healthz
      port: 8090
    initialDelaySeconds: 15
    periodSeconds: 20
    failureThreshold: 3

# ── Dashboard ─────────────────────────────────────────────────────────────────
dashboard:
  enabled: true
  image:
    repository: carvr/dashboard
    tag: latest
  replicaCount: 1

  service:
    type: ClusterIP
    port: 8501

  env:
    # Must point to analytics-api internal DNS.
    # Streamlit calls this server-side — not from the user's browser.
    LA_API_BASE: "http://analytics-api:8080"
    LA_DASH_REFRESH_SEC: "5"

  persistence:
    enabled: true
    size: 1Gi
    mountPath: /data/dashboard

  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]

  startupProbe:
    tcpSocket:
      port: 8501
    failureThreshold: 18
    periodSeconds: 5

  readinessProbe:
    tcpSocket:
      port: 8501
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 3

  livenessProbe:
    tcpSocket:
      port: 8501
    initialDelaySeconds: 30
    periodSeconds: 20
    failureThreshold: 3

# ── Analytics Ingest ──────────────────────────────────────────────────────────
# Standalone WebSocket ingest pod (ws_ingest.py).
# Writes scored telemetry and live_state rows to the shared SQLite PVC.
# Uses Recreate strategy — only one writer at a time avoids SQLite locking.
analyticsIngest:
  enabled: true
  image:
    repository: carvr/analytics-ingest
    tag: latest
  replicaCount: 1

  service:
    type: ClusterIP
    wsPort: 8766
    healthzPort: 8767

  env:
    LA_WS_INGEST_HOST: "0.0.0.0"
    LA_WS_INGEST_PORT: "8766"
    INGEST_HEALTHZ_PORT: "8767"
    LA_DATA_DIR: "/data"
    LA_DB_PATH: "/data/analytics.db"
    LA_SESSIONS_DIR: "/data/sessions"
    LA_PARTICIPANTS_DIR: "/data/participants"
    LA_PULSE_LOG_DIR: "/data/pulse"
    LA_LOG_LEVEL: "INFO"

  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]

  startupProbe:
    httpGet:
      path: /healthz
      port: 8767
    failureThreshold: 12
    periodSeconds: 5

  readinessProbe:
    httpGet:
      path: /healthz
      port: 8767
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 3

  livenessProbe:
    httpGet:
      path: /healthz
      port: 8767
    initialDelaySeconds: 15
    periodSeconds: 20
    failureThreshold: 3

# ── Analytics WS ──────────────────────────────────────────────────────────────
# Standalone WebSocket dashboard pod (ws_dashboard_server.py).
# Reads live_state rows from the shared SQLite PVC (read-only mount) and
# streams them to connected Streamlit dashboard clients.
analyticsWs:
  enabled: true
  image:
    repository: carvr/analytics-ws
    tag: latest
  replicaCount: 1

  service:
    type: ClusterIP
    port: 8768

  env:
    WS_DASHBOARD_HOST: "0.0.0.0"
    WS_DASHBOARD_PORT: "8768"
    POLL_INTERVAL: "0.5"
    LA_DB_PATH: "/data/analytics.db"
    LA_LOG_LEVEL: "INFO"

  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]

  startupProbe:
    httpGet:
      path: /healthz
      port: 8768
    failureThreshold: 12
    periodSeconds: 5

  readinessProbe:
    httpGet:
      path: /healthz
      port: 8768
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 3

  livenessProbe:
    httpGet:
      path: /healthz
      port: 8768
    initialDelaySeconds: 15
    periodSeconds: 20
    failureThreshold: 3

# ── Bridge ────────────────────────────────────────────────────────────────────
# Bridge is DISABLED in Kubernetes by default.
#
# Reason: the bridge communicates with physical Bluetooth hardware (Wahoo TICKR)
# and must run as a local process on the same machine as Unity.  Running it in a
# pod isolates it from host Bluetooth and from Unity's loopback network interface,
# making real BLE impossible and mock mode redundant (Unity already has its own
# mock data path).
#
# To run the bridge locally use:
#   macOS:   starters/START_BRIDGE.command  or  starters/START_MOCK_BRIDGE.command
#   Windows: starters/START_BRIDGE.bat      or  starters/START_MOCK_BRIDGE.bat
#
# The manifests and Dockerfile are kept here for reference only.
# Set enabled: true only if you have a specific reason to run the bridge in a pod
# (e.g. testing with a host-network pod on a Linux node with Bluetooth).
bridge:
  enabled: false
  image:
    repository: carvr/bridge
    tag: latest
  replicaCount: 1

  service:
    type: ClusterIP
    port: 8765

  env:
    BRIDGE_HOST: "0.0.0.0"
    BRIDGE_PORT: "8765"
    BRIDGE_MOCK: "1"

  persistence:
    enabled: true
    size: 1Gi
    mountPath: /data/bridge

  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]

  startupProbe:
    tcpSocket:
      port: 8765
    failureThreshold: 10
    periodSeconds: 3

  readinessProbe:
    tcpSocket:
      port: 8765
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 3

  livenessProbe:
    tcpSocket:
      port: 8765
    initialDelaySeconds: 10
    periodSeconds: 20
    failureThreshold: 3
