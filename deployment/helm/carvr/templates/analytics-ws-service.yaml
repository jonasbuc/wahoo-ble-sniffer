{{- if .Values.analyticsWs.enabled }}
---
# In-cluster:  ws://analytics-ws:8768/ws/dashboard  (Streamlit dashboard)
#              http://analytics-ws:8768/healthz  (K8s probes)
apiVersion: v1
kind: Service
metadata:
  name: analytics-ws
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "carvr.labels" . | nindent 4 }}
    app.kubernetes.io/name: analytics-ws
    app.kubernetes.io/component: ws-dashboard
spec:
  type: {{ .Values.analyticsWs.service.type }}
  selector:
    app.kubernetes.io/name: analytics-ws
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: ws-dashboard
      port: {{ .Values.analyticsWs.service.port }}
      targetPort: ws-dashboard
      protocol: TCP
{{- end }}
