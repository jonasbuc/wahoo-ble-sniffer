{{- if .Values.dashboard.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "carvr.labels" . | nindent 4 }}
    app.kubernetes.io/name: dashboard
    app.kubernetes.io/component: dashboard
spec:
  replicas: {{ .Values.dashboard.replicaCount }}
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: dashboard
      app.kubernetes.io/instance: {{ .Release.Name }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dashboard
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: dashboard
        app.kubernetes.io/part-of: carvr
    spec:
      terminationGracePeriodSeconds: 15
      securityContext:
        {{- toYaml .Values.dashboard.podSecurityContext | nindent 8 }}
      containers:
        - name: dashboard
          image: {{ include "carvr.image" (dict "registry" .Values.global.imageRegistry "repo" .Values.dashboard.image.repository "tag" .Values.dashboard.image.tag) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.dashboard.service.port }}
          envFrom:
            - configMapRef:
                name: dashboard-config
          resources:
            {{- toYaml .Values.dashboard.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.dashboard.securityContext | nindent 12 }}
          startupProbe:
            {{- toYaml .Values.dashboard.startupProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.dashboard.readinessProbe | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.dashboard.livenessProbe | nindent 12 }}
          volumeMounts:
            - name: streamlit-cache
              mountPath: /home/appuser/.streamlit
            {{- if .Values.dashboard.persistence.enabled }}
            - name: dashboard-data
              mountPath: {{ .Values.dashboard.persistence.mountPath }}
            {{- end }}
      volumes:
        - name: streamlit-cache
          emptyDir: {}
        {{- if .Values.dashboard.persistence.enabled }}
        - name: dashboard-data
          persistentVolumeClaim:
            claimName: dashboard-data-pvc
        {{- end }}
{{- end }}
